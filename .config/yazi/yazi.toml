# Yazi main config — mirror of ranger rc.conf settings.
# Ranger refs on right: `# rg: <setting>`

[mgr]
# rg: set column_ratios 3,8,8
ratio          = [3, 8, 8]
# rg: set sort natural; sort_case_insensitive true; sort_directories_first true; sort_reverse false
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
# rg: display_size_in_main_column true -> show size in line
linemode       = "size"
# rg: set show_hidden false
show_hidden    = false
show_symlink   = true
# rg: set scroll_offset 8
scrolloff      = 8
# rg: set mouse_enabled true
mouse_events   = ["click", "scroll", "touch", "move", "drag"]
title_format  = "Yazi: {cwd}"

[preview]
# rg: set wrap_plaintext_previews false
wrap            = "no"
tab_size        = 2
# Pixel budget for image previews.
max_width       = 1600
max_height      = 2400
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

# rg: rifle-like opener rules. macOS specific.
[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" },
]
# Cross-platform: macOS entries match on macOS, Linux entries match on Linux.
# Yazi picks the first matching entry per platform, so both OSes share this file.
open = [
  { run = 'open "$@"',     desc = "Open", for = "macos" },
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
]
reveal = [
  { run = 'open -R "$1"',               desc = "Reveal in Finder", for = "macos" },
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal folder",    for = "linux" },
]
extract = [
  { run = 'unar "$1"', desc = "Extract here", for = "unix" },
]
play = [
  { run = 'open "$@"',               desc = "Play",       for = "macos" },
  { run = 'mpv --force-window "$@"', desc = "Play (mpv)", orphan = true, for = "linux" },
]

[open]
# nvim default (first entry). Media handled by macOS `open`. Archives extract.
rules = [
  { name = "*/",                          use = ["edit", "open", "reveal"] },
  { mime = "text/*",                      use = ["edit", "reveal"] },
  { mime = "image/*",                     use = ["open", "reveal"] },
  { mime = "video/*",                     use = ["play", "reveal"] },
  { mime = "audio/*",                     use = ["play", "reveal"] },
  { mime = "inode/x-empty",               use = ["edit", "reveal"] },
  { mime = "application/json",            use = ["edit", "reveal"] },
  { mime = "*/javascript",                use = ["edit", "reveal"] },
  { mime = "application/{xml,toml,yaml,x-yaml,x-www-form-urlencoded}", use = ["edit", "reveal"] },
  { mime = "application/pdf",             use = ["open", "reveal"] },
  { mime = "application/zip",             use = ["extract", "reveal"] },
  { mime = "application/gzip",            use = ["extract", "reveal"] },
  { mime = "application/x-tar",           use = ["extract", "reveal"] },
  { mime = "application/x-bzip",          use = ["extract", "reveal"] },
  { mime = "application/x-bzip2",         use = ["extract", "reveal"] },
  { mime = "application/x-7z-compressed", use = ["extract", "reveal"] },
  { mime = "application/x-rar",           use = ["extract", "reveal"] },
  { mime = "application/xz",              use = ["extract", "reveal"] },
  # Fallback: nvim first so `l` opens unknown files in nvim, not macOS Launch Services.
  { mime = "*",                           use = ["edit", "open", "reveal"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512 MiB
image_bound      = [0, 0]
suppress_preload = false

[plugin]
prepend_spotters   = []
prepend_preloaders = []
prepend_previewers = []

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"

[input]
cursor_blink   = false
cd_title       = "Change directory:"
cd_origin      = "top-center"
cd_offset      = [0, 2, 50, 3]
create_title   = ["Create:", "Create (dir):"]
create_origin  = "top-center"
create_offset  = [0, 2, 50, 3]
rename_title   = "Rename:"
rename_origin  = "hovered"
rename_offset  = [0, 1, 50, 3]
filter_title   = "Filter:"
filter_origin  = "top-center"
filter_offset  = [0, 2, 50, 3]
find_title     = ["Find next:", "Find previous:"]
find_origin    = "top-center"
find_offset    = [0, 2, 50, 3]
search_title   = "Search via {n}:"
search_origin  = "top-center"
search_offset  = [0, 2, 50, 3]
shell_title    = ["Shell:", "Shell (block):"]
shell_origin   = "top-center"
shell_offset   = [0, 2, 50, 3]

[confirm]
trash_title       = "Trash {n} selected file{s}?"
trash_origin      = "center"
trash_offset      = [0, 0, 70, 20]
delete_title      = "Permanently delete {n} selected file{s}?"
delete_origin     = "center"
delete_offset     = [0, 0, 70, 20]
overwrite_title   = "Overwrite file?"
overwrite_content = "Will overwrite the following file:"
overwrite_origin  = "center"
overwrite_offset  = [0, 0, 50, 15]
quit_title        = "Are you sure you want to quit?"
quit_content      = "The following task is still running, are you sure you want to quit?"
quit_origin       = "center"
quit_offset       = [0, 0, 50, 15]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false
