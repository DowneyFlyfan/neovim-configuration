# Kitty Configuration

# ===== Fonts (platform-specific) =====
bold_font        auto
italic_font      auto
bold_italic_font auto
include ${KITTY_OS}.conf

# Powerline glyphs (Draw Powerline Glyphs: True)
# Kitty renders powerline glyphs natively, no extra config needed

# ===== Cursor =====
cursor_shape          beam
cursor_blink_interval 0
cursor_text_color     #fbf1c7

# ===== Scrollback =====
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ===== Mouse =====
copy_on_select        clipboard
mouse_hide_wait       3.0
focus_follows_mouse   yes
mouse_map left click ungrabbed no-op

# ===== Bell =====
enable_audio_bell     no
visual_bell_duration  0.1

# ===== Window =====
remember_window_size       no
initial_window_width       80c
initial_window_height      25c
window_padding_width       2
hide_window_decorations    titlebar-only
confirm_os_window_close    0
resize_in_steps            no
placement_strategy         center

# ===== Tab Bar =====
tab_bar_style            powerline
tab_bar_min_tabs         1
tab_title_template       " {index}: {title:^15.15} "
tab_bar_edge             top
tab_bar_background       #ebdbb2
active_tab_foreground    #282828
active_tab_background    #fbf1c7
active_tab_font_style    bold
inactive_tab_foreground  #928374
inactive_tab_background  #ebdbb2
inactive_tab_font_style  normal

# ===== Layouts =====
enabled_layouts splits,stack,tall,fat,grid

# ===== macOS Specific =====
macos_option_as_alt           yes
macos_quit_when_last_window_closed yes
macos_traditional_fullscreen  no
macos_titlebar_color          background
macos_colorspace              srgb

# ===== Terminal =====
term    xterm-kitty
shell   /bin/zsh

# ===== Advanced =====
allow_remote_control  yes
scrollback_fill_enlarged_window yes

# =========================================
#              Keyboard Shortcuts
# =========================================

# ----- Tabs -----
map super+t       new_tab_with_cwd
map super+w       close_window
map alt+w         close_window
map super+1       goto_tab 1
map super+2       goto_tab 2
map super+3       goto_tab 3
map super+4       goto_tab 4
map super+5       goto_tab 5
map super+6       goto_tab 6
map super+7       goto_tab 7
map super+8       goto_tab 8
map super+9       goto_tab 9
map super+shift+right next_tab
map super+shift+left  previous_tab

# Quick tab switch: alt+< → tab 1, alt+> → tab 2
map alt+shift+comma  goto_tab 1
map alt+shift+period goto_tab 2

# ----- Splits / Panes -----
# vsplit (left|right)
map super+d           launch --location=vsplit --cwd=current
# hsplit (top/bottom)
map super+shift+minus launch --location=hsplit --cwd=current
# split in same direction as parent (auto-balance)
map super+alt+d       launch --location=split --cwd=current

# Cycle layouts (splits → stack → tall → fat → grid)
map super+l       next_layout
# Toggle current window fullscreen within layout (zoom)
map super+shift+z toggle_layout stack
# Rotate splits orientation
map super+r       layout_action rotate

# Move window within splits layout
map super+alt+left   move_window left
map super+alt+right  move_window right
map super+alt+up     move_window up
map super+alt+down   move_window down

# Detach window into new tab
map super+shift+t detach_window new-tab

# ----- Navigate Panes -----
map ctrl+super+left   neighboring_window left
map ctrl+super+right  neighboring_window right
map ctrl+super+up     neighboring_window up
map ctrl+super+down   neighboring_window down

# Focus-only pane navigation (no move), alt+arrow
map alt+left   neighboring_window left
map alt+right  neighboring_window right
map alt+up     neighboring_window up
map alt+down   neighboring_window down

# ----- Resize Panes -----
map super+shift+up    resize_window taller 2
map super+shift+down  resize_window shorter 2
map super+shift+plus  resize_window wider 2
map super+shift+0     resize_window reset

# Interactive resize mode (kitten): chord into resize, arrows resize, esc exits
map super+shift+r start_resizing_window

# ----- Font Size -----
map super+equal   change_font_size all +1.0
map super+minus   change_font_size all -1.0
map super+0       change_font_size all 0

# ----- Scroll -----
map super+up        scroll_line_up
map super+down      scroll_line_down
map super+page_up   scroll_page_up
map super+page_down scroll_page_down
map super+home      scroll_home
map super+end       scroll_end


# ----- Misc -----
map super+n       new_os_window_with_cwd
map super+f       show_scrollback
map f11           toggle_fullscreen
map super+enter   toggle_fullscreen
map super+k       clear_terminal to_cursor active

