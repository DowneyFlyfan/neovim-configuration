font_family      JetBrainsMono Nerd Font
font_size        16.0

# Clipboard
map ctrl+shift+c  copy_to_clipboard
map ctrl+v        paste_from_clipboard
# Image paste -> dump clipboard PNG to temp file, paste its path (Claude Code
# reads the image from the path; works around CC Wayland paste bug #8324).
map ctrl+shift+v  kitten clip2path.py

# Search
map alt+f        show_scrollback
